<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #004d00; /* Dark green theme */
            color: #f0f0f0; /* Light text for readability */
            font-family: Arial, sans-serif;
        }
        /* Additional styling */
        .profile {
            border: 2px solid #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            background-color: #006600;  /* Darker green for profile */
        }
        .applications, .services {
            padding: 15px;
            border: 1px solid #f0f0f0;
            margin-top: 10px;
            border-radius: 5px;
            background-color: #005000; /* A lighter green */
        }
        .skills {
            display: flex;
            overflow-x: auto; /* Horizontal scrolling */
        }
        .skill-icon {
            margin: 5px;
            padding: 10px;
            border: 1px solid #f0f0f0;
            border-radius: 5px;
            background-color: #003300; /* Darker background for icons */
        }
    </style>
</head>
<body>
    <div class="profile">
        <h1>My Professional Portfolio</h1>
        <p>Welcome to my portfolio! Here you will find my projects and skills.</p>
    </div>

    <div class="applications">
        <h2>Applications</h2>
        <p>Details about applications.</p>
    </div>

    <div class="services">
        <h2>Services</h2>
        <p>Information about services offered.</p>
    </div>

    <div class="skills">
        <h2>Skills</h2>
        <div class="skill-icon">HTML</div>
        <div class="skill-icon">CSS</div>
        <div class="skill-icon">JavaScript</div>
    </div>
</body>
</html>
